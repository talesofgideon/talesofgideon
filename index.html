    <script>
      (function() {
        document.documentElement.classList.add('js');
        const safeGetItem = (key) => {
          try {
            return localStorage.getItem(key);
          } catch (e) {
            console.warn('localStorage is blocked:', e);
            return null;
          }
        };
        const theme = safeGetItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark-mode');
        } else {
          document.documentElement.classList.add('light-mode');
        }

        // Safety timeout to ensure page is visible even if main script fails
        window.addEventListener('DOMContentLoaded', () => {
          setTimeout(() => {
            document.body.classList.add('loaded');
          }, 1000);
        });

        // Pre-populate Logo styles to prevent flashing
        let siteContent = {};
        try {
          const cached = safeGetItem('siteContent');
          if (cached && cached !== 'undefined' && cached !== 'null') {
            siteContent = JSON.parse(cached) || {};
          }
        } catch (err) {
          console.error('Error parsing siteContent in header:', err);
        }
        if (siteContent.logoFont || siteContent.logoFontSize || siteContent.logoText) {
          const style = document.createElement('style');
          style.innerHTML = `
            .logo {
              ${siteContent.logoFont ? `font-family: ${siteContent.logoFont} !important;` : ''}
              ${siteContent.logoFontSize ? `font-size: ${siteContent.logoFontSize} !important;` : ''}
            }
          `;
          document.head.appendChild(style);
          
          // Also pre-populate text if possible (using MutationObserver for safety)
          if (siteContent.logoText) {
            const logoObserver = new MutationObserver((mutations, obs) => {
              const logos = document.querySelectorAll('.logo');
              if (logos.length > 0) {
                logos.forEach(logo => {
                  logo.innerText = siteContent.logoText;
                });
                obs.disconnect();
              }
            });
            logoObserver.observe(document.documentElement, { childList: true, subtree: true });
          }
        }

        // Pre-populate NEW nav link to prevent layout shift
        const storedTitle = safeGetItem('newBookTitle');
        if (storedTitle) {
          const observer = new MutationObserver((mutations, obs) => {
            const navLinks = document.querySelectorAll('.nav-links a[href="new.html"], .mobile-menu a[href="new.html"]');
            if (navLinks.length > 0) {
              navLinks.forEach(link => {
                link.innerText = `NEW: ${storedTitle.toUpperCase()}`;
              });
              obs.disconnect();
            }
          });
          observer.observe(document.documentElement, { childList: true, subtree: true });
        }

        // Fetch data/content.json to get the latest newBookTitle
        fetch('data/content.json')
          .then(res => res.json())
          .then(data => {
            if (data && data.newBookTitle) {
              try {
                localStorage.setItem('newBookTitle', data.newBookTitle);
              } catch (e) {
                console.warn('localStorage is blocked:', e);
              }
              const updateLinks = () => {
                const navLinks = document.querySelectorAll('.nav-links a[href="new.html"], .mobile-menu a[href="new.html"]');
                navLinks.forEach(link => {
                  link.innerText = `NEW: ${data.newBookTitle.toUpperCase()}`;
                });
              };
              if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', updateLinks);
              } else {
                updateLinks();
              }
            }
          })
          .catch(err => console.error('Error fetching content.json in header:', err));
      })();
    </script>
